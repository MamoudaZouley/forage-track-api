services:
  - type: web
    name: forage-track-api
    runtime: docker
    dockerfilePath: ./Dockerfile

    envVars:
      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: "false"

      - key: APP_KEY
        generateValue: true

      - key: APP_URL
        value: https://forage-track-api.onrender.com

      - key: FRONTEND_URL
        value: https://forage-track-front.onrender.com

      - key: SESSION_DOMAIN
        value: .onrender.com

      - key: DB_CONNECTION
        value: pgsql

      - key: DB_HOST
        fromDatabase:
          name: forage-track-db
          property: host

      - key: DB_PORT
        fromDatabase:
          name: forage-track-db
          property: port

      - key: DB_DATABASE
        fromDatabase:
          name: forage-track-db
          property: database

      - key: DB_USERNAME
        fromDatabase:
          name: forage-track-db
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: forage-track-db
          property: password

databases:
  - name: forage-track-db
    plan: free