services:
  - type: web
    name: forage-track-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: forage-track-db
          property: connectionString
        value: forage-track-front.onrender.com
      - key: SESSION_DOMAIN
        value: .onrender.com
      - key: FRONTEND_URL
        value: https://forage-track-front.onrender.com

databases:
  - name: forage-track-db
    plan: free